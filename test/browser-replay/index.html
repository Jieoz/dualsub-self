<!doctype html><html><head><meta charset="utf-8"><title>DualSub state-machine replay</title>
<style>html,body{margin:0;background:#111;color:#eee;font-family:system-ui}.html5-video-player{position:relative;width:960px;height:540px;margin:20px auto;background:#172033}.html5-main-video{width:100%;height:100%}</style></head><body>
<div class="html5-video-player"><video class="html5-main-video"></video></div>
<script>
const scenario=new URLSearchParams(location.search).get('scenario')||'happy';
window.__report={scenario,startedAt:performance.now(),events:[],paints:[],pauseCalls:0,playCalls:0,errors:[],finished:false};
const report=window.__report,v=document.querySelector('video');let now=.2,paused=false;
Object.defineProperty(v,'currentTime',{get(){return now},set(x){now=Number(x)||0;report.events.push({type:'seek',at:now,t:performance.now()-report.startedAt})}});
Object.defineProperty(v,'paused',{get(){return paused}});
v.pause=()=>{paused=true;report.pauseCalls++;};v.play=()=>{paused=false;report.playCalls++;return Promise.resolve();};
setInterval(()=>{if(!paused)now+=.1;v.dispatchEvent(new Event('timeupdate'))},100);
addEventListener('error',e=>report.errors.push(String(e.error||e.message)));addEventListener('unhandledrejection',e=>report.errors.push('rejection:'+String(e.reason)));
const cfg={enabled:true,apiBaseUrl:'https://fixture.invalid/v1',apiKey:'fixture',apiModel:'fixture',waitForFirstTranslation:true,waitForFirstTranslationMs:3000,showOriginal:true,showTranslated:true};
window.chrome={storage:{local:{get(k,cb){setTimeout(()=>cb({['dualsub:'+location.origin]:cfg,'dualsub:cache':{}}),0)},set(o,cb){if(cb)cb()}}},runtime:{sendMessage(){},onMessage:{addListener(){}}}};
</script>
<script src="/core.js"></script>
<script>
Promise.all([fetch('/semantic.json').then(r=>r.json())]).then(([semantic])=>{
 const Core=window.DualsubCore;let calls=0;

 Core.translateClipWithBoundaryRepair=async opts=>{const call=calls++;report.events.push({type:'translation-start',call,t:performance.now()-report.startedAt,count:opts.cues.length});if(scenario==='seek-race'&&call===0)setTimeout(()=>{v.currentTime=7.4},60);await new Promise(r=>setTimeout(r,180));if(scenario==='prewarm-failure')throw new Error('fixture prewarm failure');const map={"Let me point out that the least expensive adapter I could get my hands on":"先说明一下，这是我能弄到的最便宜的转接器。","still handled every device in our overnight test":"它仍顺利支持了通宵测试中的所有设备。","from cooking to cleaning and disinfecting":"从烹饪到清洁和消毒。"};const lines=opts.cues.map(c=>Core.shapeAlignedLine(Core.sanitizeSubtitleLine(map[c.content]||'对应的完整译文。'),16));report.events.push({type:'translation-ready',call,t:performance.now()-report.startedAt,lines});return {cues:opts.cues,lines,repaired:false}};
 function capturePaint(sampleType){const o=document.querySelector('.dualsub-orig'),z=document.querySelector('.dualsub-trans'),renderer=document.querySelector('.dualsub-renderer'),player=document.querySelector('.html5-video-player'),pb=player?player.getBoundingClientRect():null,ob=o?o.getBoundingClientRect():null,zb=z?z.getBoundingClientRect():null,ocs=o?getComputedStyle(o):null,zcs=z?getComputedStyle(z):null,rcs=renderer?getComputedStyle(renderer):null;const x={t:performance.now()-report.startedAt,sampleType:sampleType||'mutation',at:now,orig:o?o.textContent:'',trans:z?z.textContent:'',paused,playerLeft:pb?pb.left:0,playerRight:pb?pb.right:0,playerTop:pb?pb.top:0,playerBottom:pb?pb.bottom:0,origLeft:ob?ob.left:0,origRight:ob?ob.right:0,origTop:ob?ob.top:0,origBottom:ob?ob.bottom:0,transLeft:zb?zb.left:0,transRight:zb?zb.right:0,transTop:zb?zb.top:0,transBottom:zb?zb.bottom:0,baseFontPx:rcs?parseFloat(rcs.getPropertyValue('--ds-fontsize'))||22:22,origFontPx:ocs?parseFloat(ocs.fontSize):0,transFontPx:zcs?parseFloat(zcs.fontSize):0};const p=report.paints.at(-1);if(!p||Object.keys(x).some(k=>k!=='t'&&p[k]!==x[k]))report.paints.push(x)};new MutationObserver(()=>capturePaint('mutation')).observe(document.body,{subtree:true,childList:true,characterData:true,attributes:true});setInterval(()=>capturePaint('periodic'),50);
 const s=document.createElement('script');s.src='/isolated.js';s.onload=()=>setTimeout(()=>dispatchEvent(new CustomEvent('__dualsub_rpc_8f3ad7c1b2e94__',{detail:{receiver:'isolated',subject:'update-manifest',content:{videoId:'fixture-video',files:[{code:'en-asr',languageCode:'en',kind:'asr',url:'/track.json'}]}}})),20);document.body.appendChild(s);
 setTimeout(()=>{report.finished=true},scenario==='semantic-failure'||scenario==='prewarm-failure'?1400:1800);
});
</script></body></html>
