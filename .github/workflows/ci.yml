name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Syntax checks
        run: |
          node --check core.js
          node --check main.js
          node --check isolated.js
          node --check popup.js
          node --check test/e2e-harness.js
          node --check test/run-tests.js
      - name: Unit and regression tests
        run: node test/run-tests.js
      - name: Offline structural E2E
        run: node test/e2e-harness.js --full
