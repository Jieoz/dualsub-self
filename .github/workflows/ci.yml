name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Syntax checks
        run: |
          node --check core.js
          node --check main.js
          node --check isolated.js
          node --check popup.js
          node --check test/e2e-harness.js
          node --check test/browser-replay/run.js
          node --check test/run-tests.js
      - name: Unit and regression tests
        run: node test/run-tests.js
      - name: Offline structural E2E
        run: node test/e2e-harness.js --full
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
      - name: Browser state-machine replay
        env:
          DUALSUB_CDP_URL: http://127.0.0.1:9222
          DUALSUB_REPLAY_HOST: 127.0.0.1
        run: |
          chrome --headless=new --no-sandbox --disable-gpu --remote-debugging-port=9222 --user-data-dir=/tmp/dualsub-chrome about:blank >/tmp/dualsub-chrome.log 2>&1 &
          for i in {1..50}; do
            curl -fsS http://127.0.0.1:9222/json/version >/dev/null && break
            sleep 0.1
          done
          curl -fsS http://127.0.0.1:9222/json/version >/dev/null
          node test/browser-replay/run.js
